version: '3.8'

services:
  backend:
    build: ./backend
    container_name: em_backend_container
    networks:
      - em_network

  nginx:
    image: nginx:latest
    container_name: em_nginx_container
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - em_network

networks:
  em_network:
    driver: bridge